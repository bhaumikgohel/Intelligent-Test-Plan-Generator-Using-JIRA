# Render Blueprint for Intelligent Test Plan Generator
# Deploy this app to Render with one click using this configuration

services:
  - type: web
    name: intelligent-test-plan-generator
    runtime: node
    region: oregon  # Change to your preferred region: ohio, virginia, frankfurt, singapore, etc.
    plan: free      # Change to 'starter' ($7/month) or higher for persistent disk support
    
    # Build configuration
    buildCommand: |
      npm install && \
      cd backend && npm install && \
      cd ../frontend && npm install && npm run build
    
    # Start command
    startCommand: cd backend && npm start
    
    # Health check path
    healthCheckPath: /api/health
    
    # Environment variables
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000  # Render sets this automatically, but we define it explicitly
      - key: ENCRYPTION_KEY
        generateValue: true  # Auto-generate a random encryption key
      # IMPORTANT: Free tier does not support persistent disks.
      # SQLite data will be lost on every deploy/restart.
      # To persist data, either:
      #   1. Upgrade to 'starter' plan ($7/month) and uncomment the disk section below
      #   2. Use an external database like Render PostgreSQL or Supabase
      
    # Persistent disk for SQLite database (REQUIRES PAID PLAN - starter or higher)
    # Uncomment the section below if you upgrade to a paid plan:
    # disk:
    #   name: data
    #   mountPath: /opt/render/project/src/backend/data
    #   sizeGB: 1
    
    # Auto-deploy on git push to main branch
    autoDeploy: true

# Optional: Define a preview environment for pull requests
# previews:
#   generation: automatic

# Alternative: Use Render PostgreSQL instead of SQLite for persistent data on free tier
# databases:
#   - name: testplan-db
#     plan: free
#     region: oregon
