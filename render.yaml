# Render Blueprint for Intelligent Test Plan Generator
# Deploy this app to Render with one click using this configuration

services:
  - type: web
    name: intelligent-test-plan-generator
    runtime: node
    region: oregon  # Change to your preferred region: ohio, virginia, frankfurt, singapore, etc.
    plan: free      # Change to 'starter' ($7/month) or higher for persistent disk support
    
    # Build configuration
    buildCommand: |
      npm install && \
      cd backend && npm run build && \
      cd ../frontend && npx tsc && npx vite build
    
    # Start command
    startCommand: cd backend && npm start
    
    # Health check path
    healthCheckPath: /api/health
    
    # Environment variables
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000  # Render sets this automatically, but we define it explicitly
      - key: ENCRYPTION_KEY
        generateValue: true  # Auto-generate a random encryption key
      - key: DATABASE_URL
        fromDatabase:
          name: testplan-db
          property: connectionString
      # Database type: 'sqlite' or 'postgres'
      - key: DB_TYPE
        value: postgres
    
    # Persistent disk for SQLite database (REQUIRES PAID PLAN - starter or higher)
    # Uncomment the section below if you want to use SQLite with a paid plan:
    # disk:
    #   name: data
    #   mountPath: /opt/render/project/src/backend/data
    #   sizeGB: 1
    
    # Auto-deploy on git push to main branch
    autoDeploy: true

# PostgreSQL Database (FREE TIER - Persistent data without disk)
databases:
  - name: testplan-db
    plan: free
    region: oregon
    databaseName: testplan_generator
    user: testplan_user

# Optional: Define a preview environment for pull requests
# previews:
#   generation: automatic
